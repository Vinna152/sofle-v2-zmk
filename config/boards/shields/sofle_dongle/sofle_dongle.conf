CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Prospector module: this build has no APDS9960 ambient light sensor wired.
# Disable the sensor and use a fixed brightness (1-100). Without the =n line,
# the module tries to init i2c1/APDS9960 at boot and fails.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=50
